services:
  - type: web
    name: spotify-review-api
    runtime: python
    region: oregon
    plan: free

    # Build: install only the lightweight API requirements
    buildCommand: pip install -r requirements-api.txt

    # Start: bind to $PORT (Render injects this) and serve from project root
    startCommand: uvicorn dashboard.api.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      # ── Set these in the Render dashboard (not committed) ──────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      # ── Set automatically via render.yaml ──────────────────────────────────
      - key: DB_URL
        value: sqlite:////data/reviews.db   # absolute path on persistent disk
      - key: DATA_DIR
        value: /data
      - key: CHROMA_DIR
        value: /data/chroma
      - key: LOG_LEVEL
        value: INFO
      # ── ALLOWED_ORIGINS: add your Vercel URL after Phase 8 deploy ──────────
      # - key: ALLOWED_ORIGINS
      #   value: https://your-app.vercel.app

    disk:
      name: spotify-data
      mountPath: /data
      sizeGB: 1
