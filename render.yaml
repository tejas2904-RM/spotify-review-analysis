services:
  - type: web
    name: spotify-review-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements-api.txt

    startCommand: uvicorn dashboard.api.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/health

    envVars:
      # ── Set these in the Render dashboard (never commit real keys) ──────────
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      # ── Paths — relative to app root (ephemeral FS on free tier) ───────────
      - key: DB_URL
        value: sqlite:///data/reviews.db
      - key: DATA_DIR
        value: data
      - key: LOG_LEVEL
        value: INFO
      # ── CORS: comma-separated list of allowed frontend origins ──────────────
      # Update this to your exact Vercel URL after first deploy, e.g.:
      #   https://spotify-review-analysis.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://spotify-review-analysis.vercel.app
